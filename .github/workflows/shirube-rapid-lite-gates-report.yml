name: Shirube Rapid/Lite Gates Report

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  shirube-rapid-lite-gates-report:
    name: Shirube Rapid/Lite Gates Report
    uses: watchout/ai-dev-framework/.github/workflows/shirube-rapid-lite-reusable.yml@3b70d368bcbbcb1d200a941a8a0130aa54edf722
    with:
      framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
      profile: hotel-lite
      report_only: true
      execution_context_ref: .shirube/execution-context.yaml
      adoption_plan_ref: .shirube/adoption-intake.yaml
      lifecycle_state_ref: .shirube/lifecycle-state.yaml
      validation_evidence_ref: ""
      owner_decision_ref: ""
      enforcement_policy_ref: .shirube/enforcement-policy.yaml
      audit_checklist_ref: ""
      structured_audit_ref: ""
      audit_machine_evidence_ref: ""
