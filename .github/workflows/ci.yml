name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  player:
    name: Player
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/player
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/player/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Validate playlist
        run: npm run validate:playlist

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  cloud:
    name: Cloud
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  shell:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell script syntax
        run: bash -n apps/player/scripts/*.sh apps/cloud/scripts/*.sh
