name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Repo lint
        run: node scripts/ci/lint-repo.js

      - name: Shell syntax
        run: bash -n apps/player/scripts/*.sh apps/cloud/scripts/*.sh

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Player syntax check
        run: npm --prefix apps/player run check

      - name: Cloud syntax check
        run: npm --prefix apps/cloud run check

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Run unit tests
        run: node --test scripts/ci/*.test.js

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/player/package-lock.json

      - name: Install player dependencies
        run: npm ci --prefix apps/player

      - name: Validate player playlist build artifact
        run: npm --prefix apps/player run validate:playlist

      - name: Smoke local state and event queue
        run: npm --prefix apps/player run smoke:local-state

      - name: Smoke content apply hardening
        run: npm --prefix apps/player run smoke:content-apply

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Secret scan
        run: node scripts/ci/secret-scan.js

  schema-api-contract:
    name: Schema/API Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Check schema and API contract
        run: node scripts/ci/schema-api-contract-check.js

  db-migration-dry-run:
    name: DB Migration Dry-Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/cloud/package-lock.json

      - name: Install cloud dependencies
        run: npm ci --prefix apps/cloud

      - name: Run SQLite schema dry-run
        run: node scripts/ci/db-migration-dry-run.js

      - name: Smoke SQLite backup
        run: npm --prefix apps/cloud run smoke:backup

      - name: Smoke reporting read model
        run: npm --prefix apps/cloud run smoke:reporting

      - name: Smoke device command queue
        run: npm --prefix apps/cloud run smoke:device-commands

      - name: Smoke counter order UX
        run: npm --prefix apps/cloud run smoke:counter-order-ux

      - name: Smoke customer reporting access
        run: npm --prefix apps/cloud run smoke:customer-reporting-access

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install player dependencies
        run: npm ci --prefix apps/player

      - name: Audit player dependencies
        run: npm audit --prefix apps/player --audit-level=moderate

      - name: Install cloud dependencies
        run: npm ci --prefix apps/cloud

      - name: Audit cloud dependencies
        run: npm audit --prefix apps/cloud --audit-level=moderate

  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/player/package-lock.json
            apps/cloud/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=moderate

      - name: Install player dependencies
        run: npm ci --prefix apps/player

      - name: Install cloud dependencies
        run: npm ci --prefix apps/cloud

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-e2e-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  gate-0:
    name: Gate 0
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - unit-test
      - build
      - secret-scan
      - schema-api-contract
      - db-migration-dry-run
      - dependency-audit
      - e2e
    if: always()
    steps:
      - name: Check Gate 0 results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node -e '
            const needs = JSON.parse(process.env.NEEDS_JSON);
            const failed = Object.entries(needs).filter(([, job]) => !["success", "skipped"].includes(job.result));
            if (failed.length) {
              console.error("Gate 0 failed:");
              for (const [name, job] of failed) console.error(`- ${name}: ${job.result}`);
              process.exit(1);
            }
            console.log("Gate 0 passed.");
          '
