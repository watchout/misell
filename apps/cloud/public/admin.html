<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Misell 端末監視</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1>Misell 端末監視</h1>
        <button id="refresh" type="button">更新</button>
      </header>
      <main>
        <section class="section">
          <h2>稼働状況</h2>
          <div id="summary" class="metrics"></div>
        </section>
        <section class="section">
          <h2>未対応アラート</h2>
          <div id="alerts"></div>
        </section>
        <section class="section">
          <h2>通知</h2>
          <div id="notifications"></div>
        </section>
        <section class="section">
          <h2>店舗受付</h2>
          <div id="store-access-tokens"></div>
        </section>
        <section class="section">
          <h2>顧客アクセス</h2>
          <div id="customer-access-tokens"></div>
        </section>
        <section class="section">
          <h2>AI販促提案</h2>
          <div id="campaign-proposals"></div>
        </section>
        <section class="section">
          <h2>キャンペーン生成</h2>
          <div id="campaign-projects"></div>
        </section>
        <section class="section">
          <h2>カウンター注文</h2>
          <div id="counter-orders"></div>
        </section>
        <section class="section">
          <h2>リリース配布</h2>
          <div id="release-manifests"></div>
        </section>
        <section class="section">
          <h2>コンテンツ配信</h2>
          <div id="content-manifests"></div>
        </section>
        <section class="section">
          <h2>素材ライブラリ</h2>
          <div id="assets"></div>
        </section>
        <section class="section">
          <h2>ログ収集</h2>
          <div id="log-bundles"></div>
        </section>
        <section id="token-result" class="section token-result" hidden></section>
        <section class="section">
          <h2>端末一覧</h2>
          <div id="devices"></div>
        </section>
      </main>
    </div>
    <script src="/context-ui.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
