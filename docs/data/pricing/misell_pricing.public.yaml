shared_terms:
  minimum_contract_months: 12
  recommended_contract_months: 24
  quote_rule: Standard scope, site conditions, device count, installation method, and content operation scope must be confirmed before issuing a final quote.
  customer_claim_policy:
    - Advertising revenue, visitor increases, QR counts, view counts, or sales increases are not guaranteed.
    - AI report text must be based on actual logs and must not invent numeric results.
    - Camera or sensor features require legal, privacy, signage, and site-condition approval before proposal.
    - Individual identification, face recognition, and person-level tracking are outside the public offer.

