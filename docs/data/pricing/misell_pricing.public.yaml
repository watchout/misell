governance:
  rasen_boundary: Rasen may use schema, templates, and abstract adapters only. Misell product-specific public prices remain in this Misell dataset.
  internal_data_storage: Real internal economics and partner terms must live outside this public repository, such as a private repository, local database, or approved ignored local store.
  approval_gate:
    - Keep every public price record at source_status needs_human_approval until human approval is recorded.
    - Run npm run pricing:audit before any pricing implementation PR is accepted.
    - Do not duplicate hand-maintained official price tables in proposal docs; reference this canonical dataset instead.
