schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN
parent_ssot: https://github.com/watchout/misell/issues/212
approval_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
security_approval_ref: https://github.com/watchout/misell/issues/212#issuecomment-4841688485
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
premise_confirmation_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/212
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - production deployment or runtime operations
    - live publish authorization
    - legal advice or legal signoff decisions
    - branch protection or required-check mutation

cell:
  CELL-ID: CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN
  cell_ref: .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
  cell_type: runtime_foundation
  risk_class: R3
  goal: Add Studio Execution C1 publish preflight and dry-run content_manifest-like draft transform evidence for validated CampaignProjects, without active content_manifest mutation, live activation, publishing, schedule activation, Player/device mutation, provider calls, or credit consumption.
  non_scope:
    - live activation, active content_manifest creation, active/retired manifest mutation, rollback activation, or production publish
    - schedule activation, Player/device mutation, device command, delivery policy mutation, or release channel mutation
    - public/customer/external publish controls, external partner approval tokens, or self-service legal approval
    - provider generation, media rendering, MP4 export, external AI calls, MCP runtime dependency, secret handling, quota, billing, or credit ledger mutation
    - QR measurement creation, advertiser report generation, pricing, guarantee, legal signoff, or camera/POS/ad-network integration
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
    - .shirube/control-handoffs/CH-MISELL-212-studio-publish-preflight-dry-run.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
    - apps/cloud/README.md
    - apps/cloud/lib/studio-publish-preflight-contract.js
    - apps/cloud/package.json
    - apps/cloud/scripts/smoke-studio-publish-preflight.mjs
    - apps/cloud/server.js
    - package.json
    - scripts/ci/db-migration-dry-run.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/player/**
    - apps/cloud/public/**
    - apps/cloud/scripts/backup-*.mjs
    - apps/cloud/scripts/restore-*.mjs
  protected_surfaces:
    - migrations
    - runtime
    - api
  escalation_route: "approved: #212 CTO/security conditional GO and owner/CEO C1 implementation approval recorded; live activation/publish remains outside this Cell."
  stop_conditions:
    - live activation, active content_manifest mutation, publish, rollback activation, schedule activation, Player/device mutation, or delivery policy mutation is needed
    - legal signoff, external partner approval tokens, public/customer controls, provider calls, media rendering, QR creation, billing, or credit mutation is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add additive Cloud schema for studio_publish_preflight_results and content_manifest_draft_transforms.
    - Admin/operator API can create/list/get publish preflight evidence for a CampaignProject and render_manifest.
    - Preflight checks project validated, all active scenes valid, render_manifest qa_status=passed, output_sha256 exists, tenant/store/screen_group scope, content_type/publish_mode resolution, asset provenance publish-candidate safety, and docs/99 gate linkage.
    - docs/99 block and human_review_required verdicts fail closed for ad/sponsor/collaboration content.
    - Dry-run transform creates content_manifest-like draft evidence only when preflight passes.
    - Failed preflight creates failed_preflight transform evidence without active content_manifest rows.
    - Contract and API reject out-of-scope activation/publish/schedule/device/player/content_manifest mutation inputs.
    - Smoke coverage proves pass/fail paths, docs99 fail-closed behavior, render QA requirement, scope isolation, and no active content_manifest/publish_history/device/schedule/credit mutation.
    - Existing CI DB dry-run validates the C1 schema and root test:ci includes the C1 smoke.

implementation_boundary:
  summary: Implement the approved C1 dry-run evidence layer only; do not implement live activation, publish, schedule activation, Player/device mutation, provider generation, external approval tokens, legal signoff, billing, or customer/public controls.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, media renderer, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - node --check apps/cloud/lib/studio-publish-preflight-contract.js
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:studio-publish-preflight
    - npm --prefix apps/cloud run smoke:studio-cut-plan-render-contract
    - npm --prefix apps/cloud run smoke:studio-provider-job-foundation
    - node scripts/ci/db-migration-dry-run.js
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
  acceptance_tests:
    - smoke:studio-publish-preflight validates pass/fail preflight and dry-run transform evidence.
    - smoke:studio-publish-preflight validates docs99 block/human_review_required fail-closed behavior.
    - smoke:studio-publish-preflight validates render QA and project validation requirements.
    - smoke:studio-publish-preflight validates no active content_manifest creation, no publish_history, no device command, and no credit mutation.
    - db-migration-dry-run validates C1 table and column existence in existing CI.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
