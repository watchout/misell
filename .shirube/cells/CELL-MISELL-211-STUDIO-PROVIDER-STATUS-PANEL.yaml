schema_version: shirube-cell/v1
cell_id: CELL-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL
parent_ssot: https://github.com/watchout/misell/issues/211#issuecomment-4841540995
title: Studio provider status panel
cell_type: admin_ui
risk_class: R1
owner:
  role: repo_owner
  actor: watchout
goal: Add a read-only provider catalog, AI generation job, and asset provenance status panel to the authenticated Campaign Project Editor using existing #211 read APIs only.
non_scope:
  - DB migration or schema change
  - backend route/API contract change
  - new auth/RBAC model
  - provider job creation/start/complete/fail/delete UI
  - asset provenance create/update/delete or rights approval UI
  - external AI/provider call, MCP runtime dependency, API key/secret storage, webhook, paid call, or real media generation
  - content_manifest creation, publish/schedule activation, Player/device mutation
  - billing/quota/credit ledger or legal rights approval
  - customer/external preview route or share token
allowed_paths:
  - .shirube/control-handoff.yaml
  - .shirube/cells/CELL-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL.yaml
  - .shirube/control-handoffs/CH-MISELL-211-studio-provider-status-panel.yaml
  - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL.yaml
  - apps/cloud/README.md
  - apps/cloud/public/campaign-project-editor.js
  - apps/cloud/public/style.css
  - tests/e2e/misell-ui.spec.js
forbidden_paths:
  - .env
  - .env.*
  - secrets/**
  - deploy/**
  - '**/branch-protection/**'
  - '**/ruleset/**'
  - .github/workflows/**
  - apps/player/**
  - apps/cloud/server.js
  - apps/cloud/package.json
  - apps/cloud/package-lock.json
  - package.json
  - package-lock.json
protected_surfaces:
  - none
acceptance_criteria:
  - Campaign Project Editor shows active provider catalog from existing #211 read API.
  - Campaign Project Editor shows AI generation jobs scoped to the CampaignProject from existing #211 read API.
  - Campaign Project Editor shows asset provenance scoped to the CampaignProject from existing #211 read API.
  - Panel visibly states read-only status and no forbidden side effects.
  - No mutation controls are added.
  - E2E confirms visibility and no mutation controls.
