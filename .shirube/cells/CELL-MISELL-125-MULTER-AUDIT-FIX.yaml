schema_version: shirube-cell/v1
cell_id: CELL-MISELL-125-MULTER-AUDIT-FIX
parent_ssot: https://github.com/watchout/misell/pull/125
title: Multer dependency audit fix
cell_type: dependency_security
risk_class: R1
owner:
  role: repo_owner
  actor: watchout
approval_ref: https://github.com/watchout/misell/pull/125#issuecomment-4784641217
goal: Refresh the existing multer security dependency update onto current main with Shirube evidence, keeping the change limited to package manifests and lockfiles.
non_scope:
  - runtime route behavior changes
  - upload policy changes
  - DB migration
  - public/admin UI changes
  - Player behavior changes beyond dependency resolution
  - workflow, branch protection, ruleset, deploy, secret, or environment changes
allowed_paths:
  - .shirube/control-handoff.yaml
  - .shirube/cells/CELL-MISELL-125-MULTER-AUDIT-FIX.yaml
  - .shirube/control-handoffs/CH-MISELL-125-multer-audit-fix.yaml
  - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-125-MULTER-AUDIT-FIX.yaml
  - apps/cloud/package.json
  - apps/cloud/package-lock.json
  - apps/player/package.json
  - apps/player/package-lock.json
forbidden_paths:
  - .env
  - .env.*
  - secrets/**
  - deploy/**
  - '**/branch-protection/**'
  - '**/ruleset/**'
  - .github/workflows/**
  - apps/cloud/server.js
  - apps/cloud/public/**
  - apps/player/server.js
  - apps/player/public/**
  - docs/**
protected_surfaces:
  - none
stop_conditions:
  - runtime code change is needed
  - upload policy or API behavior change is needed
  - package update pulls unrelated dependency churn
  - changed file outside allowed_paths
  - forbidden path touched
  - missing exact head evidence
  - missing validation evidence
  - missing structured audit PASS/PASS_WITH_WARN for exact head
  - owner decision missing before merge
acceptance_criteria:
  - apps/cloud and apps/player package manifests require multer ^2.2.0.
  - apps/cloud and apps/player lockfiles resolve multer 2.2.0.
  - npm audit at root, apps/cloud, and apps/player reports no vulnerabilities at moderate level.
  - Cloud and Player syntax checks pass.
  - No runtime, DB, UI, workflow, deploy, or secret files are changed.
validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud audit --audit-level=moderate
    - npm --prefix apps/player audit --audit-level=moderate
    - npm audit --audit-level=moderate
    - npm --prefix apps/cloud run check
    - npm --prefix apps/player run check
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
