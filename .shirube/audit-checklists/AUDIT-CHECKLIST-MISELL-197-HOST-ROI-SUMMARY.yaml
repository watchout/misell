schema_version: shirube-audit-checklist/v1
audit_checklist_id: AUDIT-CHECKLIST-MISELL-197-HOST-ROI-SUMMARY
source:
  handoff_ref: .shirube/control-handoffs/CH-MISELL-197-host-roi-summary.yaml
  cell_ref: .shirube/cells/CELL-MISELL-197-HOST-ROI-SUMMARY.yaml
  cell_id: CELL-MISELL-197-HOST-ROI-SUMMARY
  pr: watchout/misell#TBD
items:
  - item_id: HRS-AUDIT-001
    source: allowed_paths
    verification_method: executable
    required: true
    prompt: Verify all changed files are inside handoff allowed_paths.
    expected_evidence:
      - changed_files
  - item_id: HRS-AUDIT-002
    source: forbidden_paths
    verification_method: executable
    required: true
    prompt: Verify no DB migration, workflow, package, deploy, secret, player, public UI, customer/advertiser access, publish, scheduling, billing, pricing, or external integration files are changed.
    expected_evidence:
      - changed_files
      - forbidden_path_scan
  - item_id: HRS-AUDIT-003
    source: api_contract
    verification_method: semantic
    required: true
    prompt: Verify GET /api/admin/reports/host-roi-preview is admin-only and read-only.
    expected_evidence:
      - route_review
  - item_id: HRS-AUDIT-004
    source: scope
    verification_method: semantic
    required: true
    prompt: Verify tenant_id and store_id are required, and tenant/store/screen_group/release_channel/status/campaign/content/ad_slot/creative/qr filters are enforced server-side where applicable.
    expected_evidence:
      - code_review
      - smoke_reporting_result
  - item_id: HRS-AUDIT-005
    source: composition
    verification_method: semantic
    required: true
    prompt: Verify the preview composes existing reporting summary, ad inventory, and content freshness helpers without DB migration or persistent read model storage.
    expected_evidence:
      - code_review
  - item_id: HRS-AUDIT-006
    source: labels
    verification_method: semantic
    required: true
    prompt: Verify proof-of-play, QR response, and Misell counter-order value are labelled measured; inventory and fill rate are labelled manifest_derived; ad revenue, slot price, payback, labor savings, incremental ROI, ROAS, lift, and guarantees are not_reported.
    expected_evidence:
      - code_review
      - smoke_reporting_result
  - item_id: HRS-AUDIT-007
    source: decision_prompts
    verification_method: semantic
    required: true
    prompt: Verify decision prompts are deterministic guidance only and do not make AI/prose the final authority or guarantee performance.
    expected_evidence:
      - code_review
  - item_id: HRS-AUDIT-008
    source: non_scope
    verification_method: semantic
    required: true
    prompt: Verify no advertiser/customer external access, billing/pricing/legal enforcement, content_manifest creation, publish/schedule activation, Player change, or external integration is added.
    expected_evidence:
      - code_review
      - forbidden_path_scan
  - item_id: HRS-AUDIT-009
    source: smoke
    verification_method: executable
    required: true
    prompt: Verify smoke coverage proves success path, required scope failures, wrong-store isolation, labels, forbidden claim absence, decision prompts, and no content_manifest creation side effect.
    expected_evidence:
      - smoke_reporting_result
  - item_id: HRS-AUDIT-010
    source: shirube
    verification_method: executable
    required: true
    prompt: Verify required validation commands passed and exact head is recorded.
    expected_evidence:
      - validation_results
      - exact_head_sha
