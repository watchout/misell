schema_version: shirube-audit-checklist/v1
audit_checklist_id: AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI
source:
  handoff_ref: .shirube/control-handoffs/CH-MISELL-212-studio-publish-preflight-ui.yaml
  cell_ref: .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI.yaml
  cell_id: CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI
  pr: watchout/misell#TBD
items:
  - item_id: SPPF-UI-AUDIT-001
    source: allowed_paths
    verification_method: executable
    required: true
    prompt: Verify all changed files are inside handoff allowed_paths.
    expected_evidence:
      - changed_files
  - item_id: SPPF-UI-AUDIT-002
    source: forbidden_paths
    verification_method: executable
    required: true
    prompt: Verify no forbidden paths are touched, especially server/API/lib/scripts, migrations, packages, workflows, deploy, secrets, branch protection, rulesets, or Player.
    expected_evidence:
      - changed_files
      - forbidden_path_scan
  - item_id: SPPF-UI-AUDIT-003
    source: ui_boundary
    verification_method: semantic
    required: true
    prompt: Verify the change is an authenticated admin UI over existing C1 endpoints and does not add backend/API/DB behavior.
    expected_evidence:
      - code_review
  - item_id: SPPF-UI-AUDIT-004
    source: preflight_form
    verification_method: semantic
    required: true
    prompt: Verify the editor panel lets an operator provide render_manifest_id, content_type, docs99 verdict/ref, and reason, and posts only to the existing project publish-preflights endpoint.
    expected_evidence:
      - code_review
      - e2e_result
  - item_id: SPPF-UI-AUDIT-005
    source: evidence_display
    verification_method: visual
    required: true
    prompt: Verify the panel displays latest preflight status, content_type/publish_mode, docs99 verdict, guard flags, failed checks, recent history, and draft transform status when available.
    expected_evidence:
      - preflight_ui_screenshot
      - code_review
  - item_id: SPPF-UI-AUDIT-006
    source: side_effect_boundary
    verification_method: semantic
    required: true
    prompt: Verify the UI clearly states dry-run only and introduces no publish, activate, schedule, Player/device, customer/public, provider, billing, credit, QR, advertiser, or legal signoff controls.
    expected_evidence:
      - code_review
      - e2e_result
  - item_id: SPPF-UI-AUDIT-007
    source: existing_c1_contract
    verification_method: executable
    required: true
    prompt: Verify the existing smoke:studio-publish-preflight still passes, proving the UI did not weaken C1 contract behavior.
    expected_evidence:
      - smoke_result
  - item_id: SPPF-UI-AUDIT-008
    source: e2e
    verification_method: executable
    required: true
    prompt: Verify E2E creates a validated project and QA-passed render manifest, runs preflight through the editor UI, and confirms passed status, draft_created transform, no_publish guard, and no publish-now control.
    expected_evidence:
      - e2e_result
  - item_id: SPPF-UI-AUDIT-009
    source: shirube_validation
    verification_method: executable
    required: true
    prompt: Verify required validation commands passed and exact head is recorded.
    expected_evidence:
      - validation_results
      - exact_head_sha
