schema_version: shirube-audit-checklist/v1
audit_checklist_id: AUDIT-CHECKLIST-MISELL-125-MULTER-AUDIT-FIX
source:
  handoff_ref: .shirube/control-handoffs/CH-MISELL-125-multer-audit-fix.yaml
  cell_ref: .shirube/cells/CELL-MISELL-125-MULTER-AUDIT-FIX.yaml
  cell_id: CELL-MISELL-125-MULTER-AUDIT-FIX
  pr: watchout/misell#125
items:
  - item_id: MULTER-AUDIT-001
    source: allowed_paths
    verification_method: executable
    required: true
    prompt: Verify all changed files are inside handoff allowed_paths.
    expected_evidence:
      - changed_files
  - item_id: MULTER-AUDIT-002
    source: forbidden_paths
    verification_method: executable
    required: true
    prompt: Verify no forbidden path is touched, especially workflows, runtime server code, public UI, docs, deploy, secrets, branch protection, or rulesets.
    expected_evidence:
      - changed_files
      - forbidden_path_scan
  - item_id: MULTER-AUDIT-003
    source: dependency_version
    verification_method: executable
    required: true
    prompt: Verify apps/cloud and apps/player package manifests require multer ^2.2.0 and lockfiles resolve multer 2.2.0.
    expected_evidence:
      - package_json
      - package_lock
  - item_id: MULTER-AUDIT-004
    source: dependency_audit
    verification_method: executable
    required: true
    prompt: Verify npm audit at root, apps/cloud, and apps/player reports no vulnerabilities at moderate level.
    expected_evidence:
      - npm_audit_root
      - npm_audit_cloud
      - npm_audit_player
  - item_id: MULTER-AUDIT-005
    source: runtime_non_mutation
    verification_method: semantic
    required: true
    prompt: Verify the PR does not change upload behavior, API behavior, DB schema, Player behavior, admin/public UI, or deployment configuration.
    expected_evidence:
      - changed_files
      - code_review
  - item_id: MULTER-AUDIT-006
    source: validation
    verification_method: executable
    required: true
    prompt: Verify required validation commands passed for syntax, Shirube smoke, and test:ci.
    expected_evidence:
      - validation_results
      - exact_head_sha
