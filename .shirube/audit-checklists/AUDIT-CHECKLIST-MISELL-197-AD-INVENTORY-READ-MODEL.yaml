schema_version: shirube-audit-checklist/v1
audit_checklist_id: AUDIT-CHECKLIST-MISELL-197-AD-INVENTORY-READ-MODEL
source:
  handoff_ref: .shirube/control-handoffs/CH-MISELL-197-ad-inventory-read-model.yaml
  cell_ref: .shirube/cells/CELL-MISELL-197-AD-INVENTORY-READ-MODEL.yaml
  cell_id: CELL-MISELL-197-AD-INVENTORY-READ-MODEL
  pr: watchout/misell#TBD
items:
  - item_id: AIR-AUDIT-001
    source: allowed_paths
    verification_method: executable
    required: true
    prompt: Verify all changed files are inside handoff allowed_paths.
    expected_evidence:
      - changed_files
  - item_id: AIR-AUDIT-002
    source: forbidden_paths
    verification_method: executable
    required: true
    prompt: Verify no DB migration, workflow, package, deploy, secret, player, public UI, publish, scheduling, billing, or external integration files are changed.
    expected_evidence:
      - changed_files
      - forbidden_path_scan
  - item_id: AIR-AUDIT-003
    source: api_contract
    verification_method: semantic
    required: true
    prompt: Verify GET /api/admin/reports/ad-inventory is admin-only and read-only.
    expected_evidence:
      - route_review
  - item_id: AIR-AUDIT-004
    source: scope
    verification_method: semantic
    required: true
    prompt: Verify tenant_id is required and tenant/store/screen_group/release_channel/status/campaign/content/ad_slot/creative/qr/manifest filters are enforced server-side.
    expected_evidence:
      - code_review
      - smoke_reporting_result
  - item_id: AIR-AUDIT-005
    source: inventory_logic
    verification_method: semantic
    required: true
    prompt: Verify inventory is derived from existing content_manifests.playlist_json ad/sponsor items without DB migration or persistent read model storage.
    expected_evidence:
      - code_review
  - item_id: AIR-AUDIT-006
    source: measurement_overlay
    verification_method: semantic
    required: true
    prompt: Verify measured play and QR response evidence is overlaid from existing reporting helpers and does not duplicate core aggregation logic unnecessarily.
    expected_evidence:
      - code_review
  - item_id: AIR-AUDIT-007
    source: labels_and_claims
    verification_method: semantic
    required: true
    prompt: Verify inventory is labelled manifest_derived, measured signals are labelled measured, and revenue/ROI/lift/ROAS/guarantee claims are explicitly not reported.
    expected_evidence:
      - code_review
      - smoke_reporting_result
  - item_id: AIR-AUDIT-008
    source: non_scope
    verification_method: semantic
    required: true
    prompt: Verify no advertiser/customer external access, billing, pricing, legal enforcement, content_manifest creation, publish, schedule activation, Player change, or external integration is added.
    expected_evidence:
      - code_review
      - forbidden_path_scan
  - item_id: AIR-AUDIT-009
    source: smoke
    verification_method: executable
    required: true
    prompt: Verify smoke coverage proves inventory summary, per-slot metrics, filtered view, tenant isolation, missing tenant rejection, no forbidden claims, and no content_manifest creation side effect.
    expected_evidence:
      - smoke_reporting_result
  - item_id: AIR-AUDIT-010
    source: shirube
    verification_method: executable
    required: true
    prompt: Verify required validation commands passed and exact head is recorded.
    expected_evidence:
      - validation_results
      - exact_head_sha
