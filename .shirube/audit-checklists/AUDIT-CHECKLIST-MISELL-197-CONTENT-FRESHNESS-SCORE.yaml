    expected_evidence:
      - changed_files
  - item_id: CFD-AUDIT-002
    source: forbidden_paths
    verification_method: executable
    required: true
    prompt: Verify no DB migration, workflow, package, deploy, secret, player, or public UI files are changed.
    expected_evidence:
      - changed_files
      - forbidden_path_scan
  - item_id: CFD-AUDIT-003
    source: api_contract
    verification_method: semantic
    required: true
    prompt: Verify GET /api/admin/reports/content-freshness is admin-only and read-only.
    expected_evidence:
      - route_review
  - item_id: CFD-AUDIT-004
    source: report_logic
    verification_method: semantic
    required: true
    prompt: Verify freshness uses existing content_manifests timestamps, playlist composition, and playlogs without DB migration.
    expected_evidence:
      - code_review
  - item_id: CFD-AUDIT-005
    source: config
    verification_method: semantic
    required: true
    prompt: Verify freshness thresholds are centralized in environment-backed constants.
    expected_evidence:
      - code_review
  - item_id: CFD-AUDIT-006
    source: scope_filters
    verification_method: semantic
    required: true
    prompt: Verify tenant/store/screen_group/release_channel/status filters are server-side.
    expected_evidence:
      - code_review
  - item_id: CFD-AUDIT-007
    source: non_scope
    verification_method: semantic
    required: true
    prompt: Verify no advertiser/customer external report access, legal enforcement, publish, schedule, billing, external AI, camera, POS, inventory, weather, or ad network integration is added.
    expected_evidence:
      - code_review
  - item_id: CFD-AUDIT-008
    source: smoke
    verification_method: executable
    required: true
