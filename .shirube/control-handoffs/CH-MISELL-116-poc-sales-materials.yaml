schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-116-POC-SALES-MATERIALS
parent_ssot: https://github.com/watchout/misell/issues/116
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/116
premise_confirmation_ref: https://github.com/watchout/misell/issues/116
spec_review_state: ready_for_implementation
repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/116
owner:
  role: repo_owner
  actor: watchout
next_role: implementation
cell:
  CELL-ID: CELL-MISELL-116-POC-SALES-MATERIALS
  cell_ref: .shirube/cells/CELL-MISELL-116-POC-SALES-MATERIALS.yaml
  cell_type: sales_materials
  risk_class: R2
  goal: Convert the approved Misell 30-day media partner offer into a current, Shirube-scoped POC sales materials package from main, replacing stale PR #194 without changing runtime code.
  non_scope:
    - app/runtime, Cloud, Player, DB, API, auth, workflow, package, deploy, or secret changes
    - final public publication, external URL deployment, ad campaign launch, or customer distribution approval
    - new price, guarantee, legal, ROI, ROAS, incremental, customer-logo, case-study, or verified proof claims beyond approved sources
    - Canva/OAuth/export automation
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-116-POC-SALES-MATERIALS.yaml
    - .shirube/control-handoffs/CH-MISELL-116-poc-sales-materials.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-116-POC-SALES-MATERIALS.yaml
    - docs/README.md
    - docs/102_MISELL_POC_SALES_MATERIALS_BLUEPRINT.md
    - prompts/codex_create_misell_poc_sales_materials.md
    - materials/poc_70_limited/**
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/**
    - package.json
    - package-lock.json
  protected_surfaces:
    - none
  escalation_route: "No CTO/security gate required for docs/materials-only work. Owner exact-head approval is required before merge because price, guarantee, CTA, and public claim language are included from approved sources."
  stop_conditions:
    - runtime/app/API/DB/auth/workflow/package/deploy/secret change is needed
    - new price, guarantee, legal, proof, customer logo, external claim, ROI/ROAS, or incremental claim is needed
    - publication/deployment/external distribution is requested
    - changed file outside allowed_paths
    - missing exact head evidence
    - missing structured audit PASS/PASS_WITH_WARN
    - owner decision missing before merge
  acceptance_criteria:
    - PR #194 is not merged and its useful content is resliced from current main under #116.
    - docs/102 records the sales materials blueprint and references docs/77, docs/78, docs/62, docs/98, docs/99, and docs/100.
    - materials/poc_70_limited contains README plus the 12 requested sales material files.
    - All price, guarantee, CTA, and included/excluded scope text is traceable to approved docs/77, docs/78, or #116.
    - Materials distinguish measured Misell-rail signals from estimated/incremental claims and do not promise sales, ad revenue, ROAS, lift, impressions, viewer count, QR scans, or traffic.
    - Legal/contract/publication-sensitive fields are called out as owner/legal gated before customer distribution.
    - No runtime or application files are changed.
validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm run shirube:smoke-full-operational
    - npm run test:ci if feasible
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - copy_fidelity_check
    - approval_gated_fields
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-116-POC-SALES-MATERIALS.yaml
owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null
post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
