schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN
parent_ssot: https://github.com/watchout/misell/issues/212
approval_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
security_approval_ref: https://github.com/watchout/misell/issues/212#issuecomment-4841688485
repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/212
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

cell:
  CELL-ID: CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN
  cell_ref: .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
  cell_type: runtime_foundation
  risk_class: R3
  goal: Add Studio Execution C1 publish preflight and dry-run content_manifest-like draft transform evidence for validated CampaignProjects.
  non_scope:
    - live activation, active content_manifest mutation, publish, rollback activation, schedule activation, Player/device mutation, or delivery policy mutation
    - legal signoff, external partner approval tokens, public/customer controls, provider calls, media rendering, QR creation, billing, or credit mutation
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
    - .shirube/control-handoffs/CH-MISELL-212-studio-publish-preflight-dry-run.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml
    - apps/cloud/README.md
    - apps/cloud/lib/studio-publish-preflight-contract.js
    - apps/cloud/package.json
    - apps/cloud/scripts/smoke-studio-publish-preflight.mjs
    - apps/cloud/server.js
    - package.json
    - scripts/ci/db-migration-dry-run.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/player/**
    - apps/cloud/public/**
    - apps/cloud/scripts/backup-*.mjs
    - apps/cloud/scripts/restore-*.mjs
  protected_surfaces:
    - db_migration
    - runtime
    - admin_api
    - publish_preflight_contract
    - approval_gate_read_boundary
  escalation_route: "approved: #212 CTO/security conditional GO and owner/CEO C1 implementation approval recorded; live activation/publish remains outside this Cell."
  stop_conditions:
    - live activation, active content_manifest mutation, publish, rollback activation, schedule activation, Player/device mutation, or delivery policy mutation is needed
    - legal signoff, external partner approval tokens, public/customer controls, provider calls, media rendering, QR creation, billing, or credit mutation is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add additive Cloud schema for studio_publish_preflight_results and content_manifest_draft_transforms.
    - Admin/operator API can create/list/get publish preflight evidence for a CampaignProject and render_manifest.
    - Preflight checks project validation, scene validation, render QA/output hash, tenant/store/screen_group scope, content_type/publish_mode resolution, asset provenance safety, and docs/99 gate linkage.
    - docs/99 block and human_review_required verdicts fail closed for ad/sponsor/collaboration content.
    - Dry-run transform creates content_manifest-like draft evidence only when preflight passes.
    - Failed preflight creates failed_preflight transform evidence without active content_manifest rows.
    - Contract and API reject out-of-scope activation/publish/schedule/device/player/content_manifest mutation inputs.
    - Smoke coverage proves pass/fail paths, docs99 fail-closed behavior, render QA requirement, scope isolation, and no active content_manifest/publish_history/device/credit mutation.

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - node --check apps/cloud/lib/studio-publish-preflight-contract.js
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:studio-publish-preflight
    - npm --prefix apps/cloud run smoke:studio-cut-plan-render-contract
    - npm --prefix apps/cloud run smoke:studio-provider-job-foundation
    - node scripts/ci/db-migration-dry-run.js
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-DRY-RUN.yaml

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null
