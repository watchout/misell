schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-ADVERTISER-REPORT-EXPORT
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - legal advice or final legal sign-off
    - production deployment or runtime operations
    - branch protection or required-check mutation
    - external advertiser reporting claims

cell:
  CELL-ID: CELL-MISELL-197-ADVERTISER-REPORT-EXPORT
  cell_ref: .shirube/cells/CELL-MISELL-197-ADVERTISER-REPORT-EXPORT.yaml
  cell_type: reporting_foundation
  risk_class: R3
  goal: Add internal admin JSON/CSV export for saved advertiser_campaign_preview snapshots without public links, advertiser self-service, billing, ROI/ROAS/lift claims, guarantees, publishing, or new storage schema.
  non_scope:
    - advertiser or agency login, role, self-service, public link, share URL, or external report portal
    - PDF generation, email delivery, scheduled exports, signed URLs, or file storage
    - ROI, ROAS, lift, guarantee, purchase, visit, incremental, conversion-value, or POS-settled sales claims
    - baseline/holdout attribution model
    - billing, pricing, credit, settlement, or ad contract revenue
    - DB migration, new persistent table, or new package dependency
    - content_manifest creation, schedule activation, publish, rollback, or Player/device mutation
    - provider integration, external AI, MCP runtime, media generation, camera/POS/external data ingestion, or ad network delivery
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-197-ADVERTISER-REPORT-EXPORT.yaml
    - .shirube/control-handoffs/CH-MISELL-197-advertiser-report-export.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-ADVERTISER-REPORT-EXPORT.yaml
    - apps/cloud/server.js
    - apps/cloud/scripts/smoke-reporting.mjs
    - apps/cloud/README.md
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - package.json
    - package-lock.json
    - apps/player/**
    - apps/cloud/public/**
    - tests/e2e/**
  protected_surfaces:
    - admin_api
    - reporting_contract
    - report_snapshot_export
  escalation_route: "No CTO/security escalation required for this internal admin export slice if no external advertiser access, public links, DB migration, PDF/email/scheduled export, billing, ROI/ROAS/lift/guarantee/incremental claim, publish, provider, Player/device, camera/POS, or ad network behavior is added."
  stop_conditions:
    - implementation needs external advertiser/customer/public access, share links, signed URLs, PDF, email, or scheduled exports
    - implementation needs a DB migration, new persistent table, new package dependency, or workflow change
    - implementation needs ROI, ROAS, lift, sale, visit, conversion-value, guarantee, or incremental attribution claims
    - implementation treats QR scan as sale, visit, purchase, ROI, ROAS, lift, or incremental attribution by itself
    - implementation needs content_manifest creation, publish, schedule activation, Player/device mutation, billing, camera, POS, provider, external AI, external data ingestion, or ad network delivery
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - GET /api/admin/reports/monthly-snapshots/:snapshot_id/export exports advertiser_campaign_preview snapshots only.
    - Export route requires admin auth and adds no public/customer/advertiser route.
    - format=json returns an export envelope with snapshot metadata, metrics_sha256, measurement_policy, proof_of_play, response, conversion, breakdowns, daily rows, and decision prompts.
    - format=csv returns deterministic rows for snapshot, measurement_policy, proof_of_play, response, conversion, decision prompts, and ad measurement counts.
    - Unsupported format returns 400.
    - Missing snapshot returns 404.
    - Non-advertiser snapshot export returns 400.
    - Export keeps ROI/ROAS/lift/guarantee/incremental/POS-settled sales claims not_reported or absent.
    - Reporting smoke proves no content_manifest creation or publish side effect.

implementation_boundary:
  summary: Internal admin API export for existing advertiser report snapshots.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, media renderer, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:reporting
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-ADVERTISER-REPORT-EXPORT.yaml
  acceptance_tests:
    - smoke exports advertiser report snapshot JSON.
    - smoke exports advertiser report snapshot CSV.
    - smoke rejects unsupported format and missing snapshot.
    - smoke rejects non-advertiser snapshot export.
    - smoke verifies ROI/ROAS/lift/guarantee/incremental remain not_reported or absent and no content_manifest is created.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
