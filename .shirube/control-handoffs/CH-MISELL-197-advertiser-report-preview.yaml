schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-ADVERTISER-REPORT-PREVIEW
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - legal advice or final legal sign-off
    - production deployment or runtime operations
    - branch protection or required-check configuration

cell:
  CELL-ID: CELL-MISELL-197-ADVERTISER-REPORT-PREVIEW
  cell_ref: .shirube/cells/CELL-MISELL-197-ADVERTISER-REPORT-PREVIEW.yaml
  cell_type: runtime_foundation
  risk_class: R2
  goal: Add an internal admin-only, read-only advertiser campaign report preview that helps operators inspect measured campaign evidence before external advertiser reporting is built.
  non_scope:
    - advertiser or agency login, role, self-service, or external report access
    - legal/privacy/ad-review runtime enforcement
    - regulated category support
    - billing, pricing, guarantee, credit, ROAS guarantee, or revenue settlement
    - incremental ROI, holdout, baseline, or lift claim
    - CSV/PDF export
    - DB migration or new persistent table
    - content_manifest creation, publish, schedule activation, or player change
    - external AI, camera, POS, inventory, weather, CRM, tracking tag, or ad network integration
  allowed_paths:
    - .shirube/cells/CELL-MISELL-197-ADVERTISER-REPORT-PREVIEW.yaml
    - .shirube/control-handoffs/CH-MISELL-197-advertiser-report-preview.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-ADVERTISER-REPORT-PREVIEW.yaml
    - apps/cloud/server.js
    - apps/cloud/scripts/smoke-reporting.mjs
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - .github/workflows/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - package.json
    - package-lock.json
    - apps/player/**
    - apps/cloud/public/**
  protected_surfaces:
    - runtime
    - api
  stop_conditions:
    - external advertiser/customer access is needed
    - legal/privacy/ad-review decision or regulated category support is needed
    - billing, guarantee, settlement, incremental ROI, holdout, baseline, or lift claim is needed
    - DB migration or new persistent table is needed
    - CSV/PDF export is needed
    - publish, schedule activation, Player, or content delivery mutation is needed
    - external AI, camera, POS, inventory, weather, CRM, tracking tag, or ad network integration is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add GET /api/admin/reports/advertiser-preview as an admin-only read-only endpoint.
    - Require tenant_id and campaign_id so the report cannot be requested as a broad unscoped advertiser report.
    - Build the preview from existing reporting summary/ad measurement/QR/order data without duplicating aggregation logic.
    - Label displayed signals as measured and explicitly mark incremental ROI, ROAS guarantee, and attribution claims as not reported.
    - Include deterministic decision prompts for continue/change creative/change CTA/check delivery without letting AI or prose make final decisions.
    - Preserve tenant/store/campaign/ad_slot/creative/qr filters server-side.
    - Do not create snapshots, content manifests, publish, schedule, billing, external reports, or external integrations.
    - Smoke coverage verifies successful campaign preview, scope-required failures, filter isolation, measured labels, no incremental/guarantee claim, and no content_manifest creation side effect.

implementation_boundary:
  summary: Internal admin read-only API and reporting smoke extension only.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:reporting
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-ADVERTISER-REPORT-PREVIEW.yaml
  acceptance_tests:
    - smoke:reporting validates advertiser-preview success for tenant/campaign scope.
    - smoke:reporting validates missing tenant_id/campaign_id is rejected.
    - smoke:reporting validates ad_slot/creative/qr filters.
    - smoke:reporting validates measured labels and no incremental/guarantee claim.
    - smoke:reporting validates no content_manifest creation side effect.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
