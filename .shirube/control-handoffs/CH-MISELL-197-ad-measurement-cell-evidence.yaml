schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-AD-MEASUREMENT-CELL-EVIDENCE
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796983634
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this evidence-completion Cell
    - diff scope and handoff consistency checks
    - exact-head structured audit and owner-decision evidence requirements
  shirube_does_not_own:
    - production deployment or runtime operations
    - runtime implementation review for historical merged code beyond the checklist scope
    - billing, guarantee, legal approval, or advertiser contract decisions

cell:
  CELL-ID: CELL-MISELL-197-AD-MEASUREMENT-CELL-EVIDENCE
  cell_type: governance_evidence
  risk_class: R1
  goal: Complete Shirube cell and audit checklist artifacts for the already implemented Ad Measurement Proof-of-Play foundation, without changing runtime behavior.
  non_scope:
    - runtime code changes
    - DB migration or schema changes
    - API, UI, Player, Cloud, workflow, package, deploy, secret, or branch/ruleset changes
    - advertiser self-service
    - billing, pricing, guarantee, credits, or revenue settlement
    - incremental ROI, holdout tests, baseline tests, or performance guarantee claims
    - legal or regulated-industry review enforcement
    - source verification or external sales-claim approval
  allowed_paths:
    - .shirube/cells/CELL-MISELL-197-AD-MEASUREMENT-PROOF-OF-PLAY.yaml
    - .shirube/control-handoffs/CH-MISELL-197-ad-measurement-cell-evidence.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-AD-MEASUREMENT-PROOF-OF-PLAY.yaml
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - .github/workflows/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - package.json
    - package-lock.json
    - apps/**
    - docs/**
  protected_surfaces: []
  escalation_route: "not_required: R1 evidence-only PR; protected-surface terms appear only in non-scope/checklist text and no runtime, DB, API, auth, workflow, deploy, secret, or ruleset file is changed."
  stop_conditions:
    - runtime, DB, API, UI, Player, Cloud, workflow, package, deploy, secret, or ruleset change is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - source verification, legal approval, or external claim approval is needed
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add a machine-readable cell artifact for CELL-MISELL-197-AD-MEASUREMENT-PROOF-OF-PLAY that mirrors the existing handoff scope.
    - Add a machine-readable audit checklist for CELL-MISELL-197-AD-MEASUREMENT-PROOF-OF-PLAY.
    - Keep the historical runtime handoff unchanged and use this evidence handoff as the PR control source for the cell/checklist completion.
    - Do not change runtime, API, DB, UI, workflow, package, deploy, secret, branch/ruleset, docs, or app files.
    - Keep historical runtime validation requirements in the Proof-of-Play cell/checklist for future audits.

implementation_boundary:
  summary: Shirube evidence completion only. No runtime behavior changes.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - runtime app mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for changed .shirube YAML
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  acceptance_tests:
    - changed files are limited to the three .shirube allowed paths
    - YAML safe_load passes for all changed YAML artifacts
    - Shirube smoke passes

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
