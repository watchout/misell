schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-INCREMENTAL-ROI-HOLDOUT
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation
protected_stop: true
protected_surfaces:
  - none
future_runtime_protected_surfaces:
  - runtime
  - api
  - db
escalation_route: "This slice is contract-only. Future runtime incremental ROI / holdout work requires CTO/security plus legal/privacy/ad-review approval before implementation."

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
    - explicit protected stop before future runtime incremental ROI work
  shirube_does_not_own:
    - legal advice or final legal/privacy/ad-review sign-off
    - production deployment or runtime operations
    - branch protection or required-check mutation
    - actual experiment design approval
    - external advertiser reporting claims

cell:
  CELL-ID: CELL-MISELL-197-INCREMENTAL-ROI-HOLDOUT
  cell_ref: .shirube/cells/CELL-MISELL-197-INCREMENTAL-ROI-HOLDOUT.yaml
  cell_type: docs_contract
  risk_class: R2
  goal: Define the protected implementation contract for future baseline/holdout incremental ROI work without enabling runtime incremental claims, advertiser guarantees, billing, external reporting access, or data integrations.
  non_scope:
    - runtime holdout assignment, experiment randomization, or traffic splitting
    - DB migration, persistent baseline/holdout tables, or report snapshot schema change
    - Cloud API route, Admin UI, customer UI, advertiser UI, Player behavior, or device behavior change
    - external advertiser/agency access, public links, signed URLs, report sharing, or self-service portals
    - ROI, ROAS, lift, guarantee, purchase, visit, conversion-value, attributed-sales, or incremental claim activation
    - pricing, billing, credit, settlement, contract revenue, ad revenue booking, or payout logic
    - POS, camera, biometric, sensitive profiling, inventory, weather, CRM, tracking tag, ad network, external AI, or MCP provider integration
    - content_manifest creation, publish, schedule activation, rollback, or Player/device mutation
    - legal advice, final legal sign-off, privacy sign-off, or regulated-industry approval
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-197-INCREMENTAL-ROI-HOLDOUT.yaml
    - .shirube/control-handoffs/CH-MISELL-197-incremental-roi-holdout.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-INCREMENTAL-ROI-HOLDOUT.yaml
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/**
    - tests/**
    - docs/**
    - package.json
    - package-lock.json
  protected_surfaces:
    - none
  future_runtime_protected_surfaces:
    - runtime
    - api
    - db
  escalation_route: "This slice is contract-only. Future runtime incremental ROI / holdout work requires CTO/security plus legal/privacy/ad-review approval before implementation."
  stop_conditions:
    - implementation needs runtime code, DB migration, API route, UI, Player/device behavior, report snapshot schema, or tests outside Shirube contract files
    - implementation needs actual holdout assignment, experiment randomization, baseline calculation, lift calculation, attribution model, or incremental report output
    - implementation displays or exports ROI, ROAS, lift, guaranteed outcome, attributed sales, POS-settled sales, purchase, visit, or incremental claims
    - implementation treats QR scans, playlogs, coupon/order issuance, or Misell counter-order value as incremental effect without approved baseline/holdout evidence
    - implementation needs advertiser/customer/public access, share links, signed URLs, external reporting portal, billing, pricing, settlement, or ad revenue recognition
    - implementation needs POS, camera, biometric, sensitive profiling, inventory, weather, CRM, tracking tag, ad network, external AI, or MCP provider integration
    - legal/privacy/ad-review sign-off, regulated-industry approval, or claim wording approval is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Cell contract exists and is discoverable at the #197 next-cell ID.
    - Active control handoff points to CELL-MISELL-197-INCREMENTAL-ROI-HOLDOUT.
    - This slice changes only Shirube contract files and no runtime/docs/test/package/workflow/deploy/secret surface.
    - Handoff records CTO/security and legal/privacy/ad-review approval as required before any runtime incremental ROI work.
    - Handoff blocks baseline/holdout-free incremental claims, ROI/ROAS/lift guarantees, and treating QR/playlog/order rail signals as incremental effect by themselves.
    - Audit checklist asks for allowed-path, non-runtime, gate, claim-boundary, and validation verification.

implementation_boundary:
  summary: Shirube contract and gate preparation only for future incremental ROI holdout work.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - runtime code change
    - DB migration
    - Cloud API or Admin UI change
    - advertiser/customer/public surface
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, media renderer, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for active handoff, cell, handoff, and checklist
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-INCREMENTAL-ROI-HOLDOUT.yaml
  acceptance_tests:
    - changed files are limited to active handoff, cell, handoff, and audit checklist.
    - contract states future runtime incremental ROI work requires CTO/security and legal/privacy/ad-review approval.
    - contract blocks baseline/holdout-free incremental claims and QR/playlog/order-as-incremental shortcuts.
    - smoke-full-operational passes locally.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
