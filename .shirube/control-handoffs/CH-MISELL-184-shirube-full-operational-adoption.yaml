schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-184-SHIRUBE-FULL-OPERATIONAL-ADOPTION
parent_ssot: https://github.com/watchout/misell/issues/184
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/184
premise_confirmation_ref: https://github.com/watchout/misell/issues/184
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/184
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

full_operational_adoption: true
governance_change:
  type: shirube_full_operational_adoption
  protected_surfaces:
    - github_actions_workflow
    - shirube_gate_enforcement
    - pr_template_governance
  branch_protection_mutation: false
  required_check_settings_mutation: false
  required_check_to_enable_after_merge: Shirube Full Operational Gates

rps_scope:
  shirube_owns:
    - PR-local control handoff boundary checks
    - structured audit exact-head admissibility
    - owner exact-head decision admissibility
    - full operational GitHub check pass/fail for future PRs
  shirube_does_not_own:
    - product runtime behavior
    - production deployment
    - secrets
    - DB migration or customer data
    - CEO/CTO protected business decisions
    - branch protection/ruleset mutation in this PR

cell:
  CELL-ID: CELL-MISELL-184-SHIRUBE-FULL-OPERATIONAL-ADOPTION
  cell_type: protected_stop
  risk_class: R3
  goal: Promote Misell Shirube from report-only pilot to full operational GitHub-gated flow.
  non_scope:
    - product runtime behavior changes
    - DB migration
    - deployment or production operation
    - secret read or write
    - branch protection/ruleset mutation through API
    - external AI call
    - feature implementation
  allowed_paths:
    - .github/pull_request_template.md
    - .github/workflows/shirube-full-operational-gates.yml
    - .github/workflows/shirube-rapid-lite-gates-report.yml
    - .shirube/**
    - docs/93_SHIRUBE_V3_REPORT_ONLY_PILOT.md
    - docs/94_SHIRUBE_V3_DEVELOPMENT_AND_AUDIT_FLOW.md
    - docs/95_SHIRUBE_PARTIAL_ADOPTION_GUARD.md
    - docs/96_SHIRUBE_FULL_OPERATIONAL_ADOPTION.md
    - docs/README.md
    - README.md
    - package.json
    - scripts/shirube/**
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - apps/**
    - packages/**
    - '**/migrations/**'
    - '**/migration/**'
    - '**/branch-protection/**'
    - '**/ruleset/**'
  protected_surfaces:
    - github_actions_workflow
    - shirube_gate_enforcement
    - pr_template_governance
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - product runtime path touched
    - missing exact head evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - missing owner APPROVED_EXACT_HEAD decision for exact head
    - full operational gate script fails its smoke
  acceptance_criteria:
    - Shirube GitHub workflow fails when structured audit is missing.
    - Shirube GitHub workflow fails when owner exact-head decision is missing.
    - Shirube GitHub workflow fails on unexpected Rapid/Lite would_block findings.
    - Shirube GitHub workflow runs from trusted base/default branch tools, not PR head tools.
    - Structured audit requires auditor allowlist and maker-checker separation.
    - Full operational adoption PR can pass only with protected governance handoff, structured audit, owner decision, and validation evidence.
    - Report-only wording is superseded for Misell after this adoption.

implementation_boundary:
  summary: Replace report-only Shirube workflow with a full operational gate and document the new audit/owner evidence requirements.
  expected_pr_count: 1
  forbidden_operations:
    - merge without owner exact-head decision
    - approve own audit
    - branch protection mutation
    - ruleset mutation
    - production or deploy mutation
    - secret read or write
    - product runtime edit
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

validation:
  required_commands:
    - git diff --check
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - PR_head_SHA
    - changed_files
    - validation_commands
    - validation_results
    - structured_audit_comment
    - owner_decision
  acceptance_tests:
    - full operational smoke covers adoption pass
    - full operational smoke covers missing audit block
    - full operational smoke covers normal Rapid/Lite would_block block

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
