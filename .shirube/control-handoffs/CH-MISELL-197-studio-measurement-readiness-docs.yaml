schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-STUDIO-MEASUREMENT-READINESS-DOCS
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - Rapid/Lite report-only evidence for this PR
    - diff scope and handoff consistency checks
  shirube_does_not_own:
    - existing Misell Gate 0 required checks
    - branch protection or required-check configuration
    - security/CEO approval labels and protected authorization decisions
    - production deployment or runtime operations

cell:
  CELL-ID: CELL-MISELL-197-STUDIO-MEASUREMENT-READINESS-DOCS
  cell_type: docs_only
  risk_class: R1
  goal: Record the ad/ROI measurement concepts and Studio measurement-readiness corrections before the next Studio implementation slices.
  non_scope:
    - runtime code change
    - DB migration or schema change
    - Cloud API or Player behavior change
    - content_manifest creation
    - publish or schedule activation
    - advertiser/customer self-service role change
    - billing, pricing, guarantee, or credit policy change
    - external AI, camera, POS, inventory, weather, or ad network integration
  allowed_paths:
    - .shirube/control-handoffs/CH-MISELL-197-studio-measurement-readiness-docs.yaml
    - README.md
    - docs/README.md
    - docs/90_AI_CAMPAIGN_STUDIO_RETENTION_LOOP_SPEC.md
    - docs/98_AD_OPERATION_ROI_STORY_AND_MEASUREMENT_CONCEPTS.md
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - .github/workflows/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - apps/**
    - package.json
    - package-lock.json
  protected_surfaces:
    - none
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - runtime implementation needed
    - DB migration or schema change needed
    - new auth/RBAC behavior needed
    - guarantee, pricing, billing, or credit decision needed
    - external AI, camera, POS, inventory, weather, or ad network integration needed
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - docs/98 records G12 two-sided ROI model for host-side and advertiser-side ROI.
    - docs/98 distinguishes measured, estimated, and incremental ROI labels.
    - docs/98 records Proof of Play integrity, ad inventory, advertiser report decision, JP differentiation, legal/privacy gate, and source ledger concepts.
    - docs/90 records Studio Measurement Readiness corrections for CampaignProject/Scene fields and validation direction.
    - docs/90 keeps current Studio foundation additive and does not require immediate DB/runtime changes.
    - root README and docs index include the new docs/98 reference.

implementation_boundary:
  summary: Update documentation only so later Studio and ad-measurement implementation cells inherit the measurement-ready design.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for handoff
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - owner_decision
  acceptance_tests:
    - docs/98 contains G12-1 through G12-8.
    - docs/90 contains Measurement Readiness corrections and additive implementation boundary.
    - no app/runtime files are changed.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
