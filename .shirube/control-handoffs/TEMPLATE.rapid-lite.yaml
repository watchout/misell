# Copy this file to .shirube/control-handoffs/<id>.yaml and replace
# template_schema_version with schema_version before using it in a PR.
template_schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-REPLACE-ME
parent_ssot: https://github.com/watchout/misell/issues/REPLACE-ME
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: REPLACE-ME
premise_confirmation_ref: REPLACE-ME
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/REPLACE-ME
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - Rapid/Lite report-only evidence for this PR
    - diff scope and handoff consistency checks
  shirube_does_not_own:
    - existing Misell Gate 0 required checks
    - branch protection or required-check configuration
    - security/CEO approval labels and protected authorization decisions
    - production deployment or runtime operations

cell:
  CELL-ID: CELL-MISELL-REPLACE-ME
  cell_type: docs_only | scaffold | code_lite | integration_lite | protected_stop
  risk_class: R0 | R1 | R2 | R3
  goal: Replace with one concrete goal.
  non_scope:
    - Replace with explicit exclusions.
  allowed_paths:
    - docs/**
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - owner decision missing before merge
  acceptance_criteria:
    - Replace with measurable acceptance criteria.

implementation_boundary:
  summary: Replace with the bounded implementation approach.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

validation:
  required_commands:
    - git diff --check
  required_evidence:
    - changed_files
    - validation_commands
    - owner_decision
  acceptance_tests:
    - Replace with test or smoke expectations.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
