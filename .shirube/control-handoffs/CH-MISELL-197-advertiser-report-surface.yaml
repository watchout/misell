schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-ADVERTISER-REPORT-SURFACE
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - legal advice or final legal sign-off
    - production deployment or runtime operations
    - branch protection or required-check mutation
    - external advertiser reporting claims

cell:
  CELL-ID: CELL-MISELL-197-ADVERTISER-REPORT-SURFACE
  cell_ref: .shirube/cells/CELL-MISELL-197-ADVERTISER-REPORT-SURFACE.yaml
  cell_type: ui_foundation
  risk_class: R2
  goal: Add a read-only internal admin UI surface that shows existing D1/D3 measured advertiser evidence inside CampaignProject editor, without external advertiser access, ROI/ROAS/lift claims, billing, content_manifest creation, publish, provider calls, or Player/device mutation.
  non_scope:
    - advertiser or agency login, role, self-service, public link, or external report access
    - legal/privacy/ad-review runtime enforcement or regulated category support
    - ROI, ROAS, lift, guarantee, purchase, visit, incremental, or conversion-value claims
    - baseline/holdout attribution model
    - CSV/PDF export, snapshot creation, billing, pricing, credit, or settlement
    - DB migration, new persistent table, or new API route
    - content_manifest creation, schedule activation, publish, rollback, or Player/device mutation
    - provider integration, external AI, MCP runtime, media generation, camera/POS/external data ingestion, or ad network delivery
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-197-ADVERTISER-REPORT-SURFACE.yaml
    - .shirube/control-handoffs/CH-MISELL-197-advertiser-report-surface.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-ADVERTISER-REPORT-SURFACE.yaml
    - apps/cloud/public/campaign-project-editor.js
    - apps/cloud/public/style.css
    - tests/e2e/misell-ui.spec.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - package.json
    - package-lock.json
    - apps/player/**
    - apps/cloud/server.js
    - apps/cloud/lib/**
    - apps/cloud/scripts/**
  protected_surfaces:
    - admin_ui
    - reporting_surface
  escalation_route: "No CTO/security escalation required for this UI-only internal read surface. Stop if a new API, DB migration, external advertiser access, ROI/ROAS/lift/guarantee claim, billing, publish, provider, Player/device, camera/POS, or ad network behavior is needed."
  stop_conditions:
    - implementation needs a new API route, DB migration, or persistent table
    - implementation needs external advertiser/customer/public access
    - implementation needs ROI, ROAS, lift, sale, visit, conversion-value, guarantee, or incremental attribution claims
    - implementation treats QR scan as sale, visit, purchase, ROI, ROAS, lift, or incremental attribution by itself
    - implementation needs content_manifest creation, publish, schedule activation, Player/device mutation, billing, camera, POS, provider, external AI, external data ingestion, or ad network delivery
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - CampaignProject editor includes an internal advertiser report preview panel.
    - The panel reads existing CampaignProject proof-of-play binding API and advertiser-preview API only.
    - The panel shows project scope, campaign_id, proof-of-play, QR response, and order evidence counts.
    - The panel has no buttons or mutation controls.
    - The panel explicitly states no external advertiser access, no ROI/ROAS/lift/guarantee claim, no billing, and no publish.
    - Missing campaign_id is handled as a non-error "measurement not connected" state.
    - E2E seeds existing D1/D3 evidence and verifies the internal UI surface displays measured response-only evidence.

implementation_boundary:
  summary: UI-only internal admin report surface using existing read APIs.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, media renderer, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud run check
    - npm run test:e2e
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-ADVERTISER-REPORT-SURFACE.yaml
  acceptance_tests:
    - E2E creates a D1 measurement binding and QR binding through existing APIs.
    - E2E records QR response evidence and rebuilds D3 proof-of-play through existing APIs.
    - E2E verifies the CampaignProject editor report panel shows measured response-only evidence.
    - E2E verifies the panel has no mutation buttons.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
