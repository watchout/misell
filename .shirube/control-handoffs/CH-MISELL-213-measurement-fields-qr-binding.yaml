schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-213-MEASUREMENT-FIELDS-QR-BINDING
parent_ssot: https://github.com/watchout/misell/issues/213
approval_ref: https://github.com/watchout/misell/issues/213#issuecomment-4849859326
security_approval_ref: https://github.com/watchout/misell/issues/213#issuecomment-4841741720
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/213#issuecomment-4849859326
premise_confirmation_ref: https://github.com/watchout/misell/issues/213#issuecomment-4849859326
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/213
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - production deployment or runtime operations
    - legal advice or legal signoff decisions
    - branch protection or required-check mutation
    - external advertiser reporting claims

cell:
  CELL-ID: CELL-MISELL-213-MEASUREMENT-FIELDS-QR-BINDING
  cell_ref: .shirube/cells/CELL-MISELL-213-MEASUREMENT-FIELDS-QR-BINDING.yaml
  cell_type: runtime_foundation
  risk_class: R3
  goal: Add Studio Execution D1 measurement binding and QR reverse lookup foundation, without external reporting UI, ROI claims, content_manifest creation, publish activation, provider calls, Player/device mutation, or billing/credit behavior.
  non_scope:
    - external advertiser reporting UI or customer/public controls
    - ROI, ROAS, lift, guarantee, purchase, visit, or incremental claims
    - content_manifest creation, content_manifest activation, schedule activation, publish, rollback, release channel mutation, delivery policy mutation, or Player/device mutation
    - provider integration, external AI, MCP runtime, media generation, camera/POS/external data ingestion, ad network delivery
    - billing, quota, credit ledger, pricing, or legal/ad claim approval beyond preserving labels and guardrails
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-213-MEASUREMENT-FIELDS-QR-BINDING.yaml
    - .shirube/control-handoffs/CH-MISELL-213-measurement-fields-qr-binding.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-213-MEASUREMENT-FIELDS-QR-BINDING.yaml
    - apps/cloud/README.md
    - apps/cloud/lib/studio-measurement-binding-contract.js
    - apps/cloud/package.json
    - apps/cloud/scripts/smoke-studio-measurement-binding.mjs
    - apps/cloud/server.js
    - package.json
    - scripts/ci/db-migration-dry-run.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/player/**
    - apps/cloud/public/**
  protected_surfaces:
    - migrations
    - runtime
    - api
    - reporting_contract
  escalation_route: "approved for D1 only by #213 CTO/security and owner/CEO comments; stop if external reporting UI, ROI/ROAS/lift/guarantee/incremental claims, publish/content_manifest activation, provider, billing, Player/device, camera/POS, or public/customer controls are needed."
  stop_conditions:
    - implementation needs ROI/lift/ROAS/incremental claims beyond labels and guardrails
    - implementation treats QR scan as sale, visit, purchase, ROI, ROAS, lift, or incremental attribution by itself
    - implementation needs external advertiser reporting UI or customer/public controls
    - implementation needs content_manifest creation, publish, schedule activation, Player/device mutation, billing, camera, POS, provider, external AI, or external data ingestion
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add additive Cloud schema for studio_measurement_bindings and studio_qr_bindings.
    - Add optional additive measurement fields to CampaignProject, Scene, qr_links, and qr_scans.
    - Admin/operator APIs can create/list/get/validate/soft-delete measurement bindings.
    - Admin/operator API can create QR binding evidence and link it to existing qr_links without content_manifest creation or publish activation.
    - QR scan rows preserve reverse lookup to tenant/store/screen_group/project/scene/creative/campaign/ad slot.
    - measurement_label=incremental without accepted baseline/holdout evidence is blocked.
    - measurement_label=measured with advertiser_reported/external_estimate/baseline_model is blocked.
    - QR scan evidence is explicitly measured_response_only and cannot represent purchase/visit/ROI attribution by itself.
    - Soft delete uses deleted status/deleted_at, and active QR links are revoked when their measurement binding is deleted.
    - Smoke proves scope isolation, label guard, QR reverse lookup, no ROI fabrication, no content_manifest creation, no publish, and no Player/device mutation.

implementation_boundary:
  summary: Implement D1 measurement/QR evidence foundation only; leave D2-D4 external reporting, ROI claims, publish activation, provider integration, billing, and device mutation for later gated Cells.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, media renderer, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - node --check apps/cloud/lib/studio-measurement-binding-contract.js
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:studio-measurement-binding
    - npm --prefix apps/cloud run smoke:studio-publish-preflight
    - node scripts/ci/db-migration-dry-run.js
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-213-MEASUREMENT-FIELDS-QR-BINDING.yaml
  acceptance_tests:
    - smoke:studio-measurement-binding validates binding create/list/get/validate and QR linking.
    - smoke:studio-measurement-binding validates incremental and measured-source hard blockers.
    - smoke:studio-measurement-binding validates QR scan reverse lookup and measured_response_only attribution.
    - smoke:studio-measurement-binding validates tenant/store/screen_group isolation and soft delete.
    - smoke:studio-measurement-binding validates no content_manifest, publish_history, device command, or credit mutation.
    - db-migration-dry-run validates D1 table and column existence.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
