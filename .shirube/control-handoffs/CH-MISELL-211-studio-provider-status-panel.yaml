matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/211#issuecomment-4841540995
premise_confirmation_ref: https://github.com/watchout/misell/issues/211#issuecomment-4841540995
spec_review_state: ready_for_implementation
repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/211
owner:
  role: repo_owner
  actor: watchout
next_role: implementation
cell:
  CELL-ID: CELL-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL
  cell_ref: .shirube/cells/CELL-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL.yaml
  cell_type: admin_ui
  risk_class: R1
  goal: Add a read-only provider catalog, AI generation job, and asset provenance status panel to the authenticated Campaign Project Editor using existing #211 read APIs only.
  non_scope:
    - DB migration or schema change
    - backend route/API contract change
    - new auth/RBAC model
    - provider job creation/start/complete/fail/delete UI
    - asset provenance create/update/delete or rights approval UI
    - external AI/provider call, MCP runtime dependency, API key/secret storage, webhook, paid call, or real media generation
    - content_manifest creation, publish/schedule activation, Player/device mutation
    - billing/quota/credit ledger or legal rights approval
    - customer/external preview route or share token
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL.yaml
    - .shirube/control-handoffs/CH-MISELL-211-studio-provider-status-panel.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL.yaml
    - apps/cloud/README.md
    - apps/cloud/public/campaign-project-editor.js
    - apps/cloud/public/style.css
    - tests/e2e/misell-ui.spec.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/player/**
    - apps/cloud/server.js
    - apps/cloud/package.json
    - apps/cloud/package-lock.json
    - package.json
    - package-lock.json
  protected_surfaces:
    - none
  escalation_route: "not_required: read-only UI over already-approved #211 read APIs; stop if mutation, provider call, secret, credit, legal approval, publish, or content_manifest behavior is needed."
  stop_conditions:
    - any mutation UI, new API, schema, auth/RBAC, provider call, secret, credit, publish, content_manifest, or legal approval behavior becomes necessary
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Campaign Project Editor shows active provider catalog from existing #211 read API.
    - Campaign Project Editor shows AI generation jobs scoped to the CampaignProject from existing #211 read API.
    - Campaign Project Editor shows asset provenance scoped to the CampaignProject from existing #211 read API.
    - Panel visibly states read-only status and shows no-external-provider/no-secret/no-credit/no-content_manifest/no-publish boundaries.
    - No create/start/complete/fail/delete/rights approval controls are added.
    - E2E confirms panel visibility, empty/non-empty state where feasible, and absence of mutation controls.
    - No backend/API/DB/auth/workflow/package/runtime publish behavior is changed.
validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:studio-provider-job-foundation
    - npm run test:e2e
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-211-STUDIO-PROVIDER-STATUS-PANEL.yaml
owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null
post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
