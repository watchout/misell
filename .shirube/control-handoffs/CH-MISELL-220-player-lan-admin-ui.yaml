schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-220-PLAYER-LAN-ADMIN-UI
parent_ssot: https://github.com/watchout/misell/issues/220
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/220
premise_confirmation_ref: https://github.com/watchout/misell/issues/220
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/220
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Player LAN Admin UI Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - production deployment or runtime operations
    - branch protection or required-check configuration
    - remote CMS, Cloud admin, billing, advertiser, AI, or publish authorization

cell:
  CELL-ID: CELL-MISELL-220-PLAYER-LAN-ADMIN-UI
  cell_ref: .shirube/cells/CELL-MISELL-220-PLAYER-LAN-ADMIN-UI.yaml
  cell_type: admin_ui
  risk_class: R2
  goal: Improve the local Player LAN Admin screen so on-site operators can safely upload assets, edit playlist items, preview unsaved changes, save, and reload the player from a clearer three-pane workflow.
  non_scope:
    - Cloud CMS, remote device command execution, or multi-store management
    - backend route, auth, DB, package, workflow, deploy, or secret changes
    - public LP copy, price, guarantee, legal claim, advertiser, billing, AI generation, or content_manifest publish behavior
    - Player playback behavior changes outside existing local preview support
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-220-PLAYER-LAN-ADMIN-UI.yaml
    - .shirube/control-handoffs/CH-MISELL-220-player-lan-admin-ui.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-220-PLAYER-LAN-ADMIN-UI.yaml
    - apps/player/public/admin.html
    - apps/player/public/admin.js
    - apps/player/public/style.css
    - tests/e2e/misell-ui.spec.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/cloud/**
    - apps/player/server.js
    - apps/player/package.json
    - apps/player/package-lock.json
    - apps/player/data/**
  protected_surfaces:
    - local_player_admin_ui
    - existing_basic_auth_admin_route_only
  escalation_route: "No CTO/CEO gate required for this UI-only R2 Cell; stop if auth, backend, DB, deploy, public, AI, billing, advertiser, or publish behavior is needed."
  stop_conditions:
    - backend route, auth, DB, package, workflow, deploy, secret, or Player playback behavior change is needed
    - public/customer/Cloud CMS/remote command/AI/billing/advertiser/content_manifest/publish behavior is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - /admin remains Basic-auth protected through the existing route and loads with assets, playlist, status summary, and operation log.
    - Desktop layout presents a clear three-pane workflow for assets, playlist order, and selected item detail.
    - Narrow layout switches to tabs for assets, playlist, detail, and JSON without horizontal page scrolling for primary controls.
    - Save is disabled when there are no unsaved changes and becomes primary when edits occur.
    - Unsaved changes are visible, protected by beforeunload, and can be previewed through existing local_preview support.
    - Asset upload guidance, upload rejection, asset filter, usage count, path copy, and delete confirmation are visible.
    - 3-zone and wide items can be added, selected, edited, locally validated, previewed, saved, and reloaded.
    - Raw JSON is collapsed by default and JSON apply validates parse errors without destroying current editable state.
    - Broken /demo/industry-*.html paths are not introduced or selectable.
    - No Cloud, backend, DB, auth, workflow, package, AI, billing, advertiser, content_manifest, or publish changes are introduced.

design_rule_exceptions:
  - rule_id: DR-DATA-001
    scope:
      - apps/player/public/admin.js
    approved_by: watchout
    approved_ref: https://github.com/watchout/misell/pull/221#issuecomment-4841136959
    reason: "#220 requires asset delete confirmation with affected playlist usages. This Cell changes only the existing LAN admin UI over the pre-existing /api/assets DELETE route and does not change backend, DB, or deletion semantics."
    expires_at: "2026-07-31T00:00:00Z"

implementation_boundary:
  summary: UI-only refactor of the existing local Player LAN Admin screen using existing Player APIs.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - backend route mutation
    - auth or DB mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/player run check
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - desktop_admin_screenshot
    - narrow_admin_screenshot
    - validation_error_or_upload_reject_evidence
    - manual_flow_note
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-220-PLAYER-LAN-ADMIN-UI.yaml
  acceptance_tests:
    - Player check passes.
    - Desktop and narrow screenshots show the new IA.
    - Existing E2E is updated to use the selected-item detail pane instead of removed row-inline fields.
    - Manual flow confirms add/edit/preview/save/reload behavior.
    - Changed files remain inside allowed paths.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
