schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-213-PROOF-OF-PLAY-REPORTING-CONNECTION
parent_ssot: https://github.com/watchout/misell/issues/213
approval_ref: https://github.com/watchout/misell/issues/213#issuecomment-4851349790
security_approval_ref: https://github.com/watchout/misell/issues/213#issuecomment-4851257957
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/213#issuecomment-4851349790
premise_confirmation_ref: https://github.com/watchout/misell/issues/213#issuecomment-4851349790
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/213
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - production deployment or runtime operations
    - legal advice or legal signoff decisions
    - branch protection or required-check mutation
    - external advertiser reporting claims

cell:
  CELL-ID: CELL-MISELL-213-PROOF-OF-PLAY-REPORTING-CONNECTION
  cell_ref: .shirube/cells/CELL-MISELL-213-PROOF-OF-PLAY-REPORTING-CONNECTION.yaml
  cell_type: runtime_foundation
  risk_class: R3
  goal: Add Studio Execution D3 proof-of-play reporting connection from existing playlogs, QR scans, and D1 measurement/QR bindings, without ROI claims, external reporting UI, content_manifest creation, publish activation, provider calls, Player/device mutation, or billing/credit behavior.
  non_scope:
    - external advertiser UI, customer/public controls, or advertiser self-service
    - ROI, ROAS, lift, guarantee, purchase, visit, incremental, or conversion-value claims
    - baseline/holdout attribution model or legal/ad claim approval UI
    - content_manifest creation, content_manifest activation, schedule activation, publish, rollback, release channel mutation, delivery policy mutation, or Player/device mutation
    - provider integration, external AI, MCP runtime, media generation, camera/POS/external data ingestion, ad network delivery
    - billing, quota, credit ledger, pricing, or revenue settlement
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-213-PROOF-OF-PLAY-REPORTING-CONNECTION.yaml
    - .shirube/control-handoffs/CH-MISELL-213-proof-of-play-reporting-connection.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-213-PROOF-OF-PLAY-REPORTING-CONNECTION.yaml
    - apps/cloud/README.md
    - apps/cloud/lib/studio-proof-of-play-contract.js
    - apps/cloud/package.json
    - apps/cloud/scripts/smoke-studio-proof-of-play-reporting.mjs
    - apps/cloud/server.js
    - package.json
    - scripts/ci/db-migration-dry-run.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/player/**
    - apps/cloud/public/**
  protected_surfaces:
    - migrations
    - runtime
    - api
    - reporting_contract
  escalation_route: "approved for D3 by #213 CTO/security and owner/CEO comments; stop if external reporting UI, ROI/ROAS/lift/guarantee/incremental claims, publish/content_manifest activation, provider, billing, Player/device, camera/POS, public/customer controls, or ad network behavior are needed."
  stop_conditions:
    - implementation needs ROI, lift, ROAS, sale, visit, conversion-value, guarantee, or incremental attribution claims
    - implementation treats QR scan as sale, visit, purchase, ROI, ROAS, lift, or incremental attribution by itself
    - implementation needs external advertiser reporting UI or customer/public controls
    - implementation needs content_manifest creation, publish, schedule activation, Player/device mutation, billing, camera, POS, provider, external AI, or external data ingestion
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add additive Cloud schema for studio_proof_of_play_bindings.
    - Rebuild/backfill is deterministic and idempotent from existing playlog and QR scan sources.
    - Unique keys prevent duplicate proof rows for the same measurement binding/source event.
    - Admin/operator APIs can rebuild/list/get proof evidence only.
    - Proof rows preserve reverse lookup to tenant/store/screen_group/project/scene/creative/campaign/ad slot/QR link.
    - Proof rows preserve D1 measurement_label and data_source_class.
    - Playlog evidence is explicitly measured_play_evidence only.
    - QR scan evidence is explicitly measured_response_only only.
    - Scope isolation is enforced for tenant/store/screen_group on rebuild/list/detail APIs.
    - Smoke proves no content_manifest, publish_history, device command, Player/device mutation, provider call, or credit ledger mutation.

implementation_boundary:
  summary: Implement D3 proof-of-play reporting read-model connection only; leave D4 advertiser report UI, ROI claims, legal approval UI, publish activation, provider integration, billing, and device mutation for later gated Cells.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, media renderer, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - node --check apps/cloud/lib/studio-proof-of-play-contract.js
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:studio-proof-of-play-reporting
    - npm --prefix apps/cloud run smoke:studio-measurement-binding
    - node scripts/ci/db-migration-dry-run.js
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-213-PROOF-OF-PLAY-REPORTING-CONNECTION.yaml
  acceptance_tests:
    - smoke:studio-proof-of-play-reporting validates rebuild/list/get proof evidence.
    - smoke:studio-proof-of-play-reporting validates idempotent rebuild and duplicate protection.
    - smoke:studio-proof-of-play-reporting validates playlog evidence_label=measured_play_evidence.
    - smoke:studio-proof-of-play-reporting validates QR evidence_label=measured_response_only.
    - smoke:studio-proof-of-play-reporting validates tenant/store/screen_group isolation and out-of-scope ROI input rejection.
    - smoke:studio-proof-of-play-reporting validates no content_manifest, publish_history, device command, or credit mutation.
    - db-migration-dry-run validates D3 table and column existence.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
