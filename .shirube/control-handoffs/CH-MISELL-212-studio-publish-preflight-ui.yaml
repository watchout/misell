schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI
parent_ssot: https://github.com/watchout/misell/issues/212
approval_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
security_approval_ref: https://github.com/watchout/misell/issues/212#issuecomment-4841688485
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
premise_confirmation_ref: https://github.com/watchout/misell/issues/212#issuecomment-4847588557
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/212
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this UI Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - production deployment or runtime operations
    - live publish authorization
    - legal advice or legal signoff decisions
    - branch protection or required-check mutation

cell:
  CELL-ID: CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI
  cell_ref: .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI.yaml
  cell_type: admin_ui
  risk_class: R2
  goal: Add an authenticated Campaign Project editor panel for existing Studio Execution C1 publish preflight dry-runs, without backend/API/DB changes, live activation, publishing, schedule activation, Player/device mutation, provider calls, or customer/public controls.
  non_scope:
    - backend route, API contract, DB migration, package, workflow, deploy, secret, branch protection, or ruleset changes
    - Studio Execution C2 approval workflow, approval decision mutation, legal signoff, external partner approval tokens, or publish authorization
    - live activation, active content_manifest creation/mutation, schedule activation, publish_history mutation, rollback activation, Player/device mutation, or delivery policy mutation
    - public/customer/external publish controls, provider calls, external AI, media rendering, MP4 export, billing, credits, QR creation, advertiser reports, camera/POS/ad-network integration
  allowed_paths:
    - .shirube/control-handoff.yaml
    - .shirube/cells/CELL-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI.yaml
    - .shirube/control-handoffs/CH-MISELL-212-studio-publish-preflight-ui.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI.yaml
    - apps/cloud/README.md
    - apps/cloud/public/campaign-project-editor.js
    - apps/cloud/public/style.css
    - tests/e2e/misell-ui.spec.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - .github/workflows/**
    - apps/cloud/server.js
    - apps/cloud/lib/**
    - apps/cloud/scripts/**
    - apps/cloud/package.json
    - apps/cloud/package-lock.json
    - apps/player/**
    - package.json
    - package-lock.json
  protected_surfaces:
    - existing_authenticated_admin_route_only
    - studio_publish_preflight_ui
  escalation_route: "No new CTO/CEO gate required for this UI-only C1 panel; stop if C2 approval workflow, publish authorization, backend/API/DB, live activation, legal signoff, provider, billing, customer/public, or Player/device behavior is needed."
  stop_conditions:
    - backend/API/DB/schema/workflow/package/deploy/secret/auth behavior change is needed
    - C2 approval workflow, legal signoff, publish authorization, live activation, schedule activation, Player/device mutation, provider call, billing/credit mutation, QR creation, or public/customer route is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Authenticated Campaign Project editor fetches existing C1 preflight history for the project.
    - Editor panel lets an operator enter a render_manifest_id, content_type, docs99 verdict/ref, and request reason, then calls the existing C1 preflight API.
    - Panel displays latest preflight status, content_type/publish_mode, docs99 verdict, dry-run guard flags, failed checks, recent history, and draft transform status when available.
    - UI clearly states that C1 is dry-run evidence only and does not publish, activate content_manifest, activate schedule, or mutate Player/devices.
    - No publish/activate/schedule/device/customer/public controls are introduced.
    - E2E creates a validated project and QA-passed render manifest, runs the preflight through the editor UI, and confirms passed status plus no publish control.

implementation_boundary:
  summary: UI-only panel over existing Studio Execution C1 publish preflight APIs.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - backend route mutation
    - API contract mutation
    - DB or migration mutation
    - live publish or activation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - node --check apps/cloud/public/campaign-project-editor.js
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:studio-publish-preflight
    - npm run test:e2e
    - npm run shirube:smoke-full-operational
    - npm run test:ci
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - preflight_ui_screenshot
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-212-STUDIO-PUBLISH-PREFLIGHT-UI.yaml
  acceptance_tests:
    - E2E verifies the preflight panel is visible in the authenticated editor.
    - E2E creates a QA-passed render manifest and runs the C1 preflight through the UI.
    - E2E verifies passed status, draft_created transform status, no_publish guard, and no publish-now control.
    - Changed files remain inside allowed paths.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
