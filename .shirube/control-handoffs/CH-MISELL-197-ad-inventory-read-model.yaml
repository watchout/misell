schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-AD-INVENTORY-READ-MODEL
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - checklist-driven audit request evidence
  shirube_does_not_own:
    - legal advice or final legal sign-off
    - production deployment or runtime operations
    - advertiser contracts, billing, pricing, or revenue settlement

cell:
  CELL-ID: CELL-MISELL-197-AD-INVENTORY-READ-MODEL
  cell_ref: .shirube/cells/CELL-MISELL-197-AD-INVENTORY-READ-MODEL.yaml
  cell_type: runtime_foundation
  risk_class: R2
  goal: Add an internal admin-only, read-only ad inventory report that derives sellable ad slot availability and fill rate from active content manifests, then overlays measured play and QR response evidence.
  non_scope:
    - advertiser or agency login, self-service, or external report access
    - billing, pricing, ad revenue booking, settlement, guarantee, credit, or invoice logic
    - incremental ROI, holdout, baseline, lift, ROAS, or performance guarantee claim
    - legal/privacy/ad-review runtime enforcement or regulated category approval
    - DB migration, new table, or persistent read model storage
    - content_manifest creation, publish, schedule activation, player delivery mutation, or playlist mutation
    - external AI, camera, POS, inventory, weather, CRM, tracking tag, or ad network integration
  allowed_paths:
    - .shirube/cells/CELL-MISELL-197-AD-INVENTORY-READ-MODEL.yaml
    - .shirube/control-handoffs/CH-MISELL-197-ad-inventory-read-model.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-AD-INVENTORY-READ-MODEL.yaml
    - apps/cloud/server.js
    - apps/cloud/scripts/smoke-reporting.mjs
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - .github/workflows/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - package.json
    - package-lock.json
    - apps/player/**
    - apps/cloud/public/**
  protected_surfaces:
    - runtime
    - api
  escalation_route: "not_required: R2 admin-only read-only runtime/API report; no auth model, DB migration, workflow, deploy, secret, billing, legal enforcement, external integration, or public advertiser surface."
  stop_conditions:
    - DB migration or new persistent table is needed
    - external advertiser/customer access is needed
    - billing, pricing, guarantee, settlement, invoice, or revenue recognition decision is needed
    - incremental ROI, holdout, baseline, lift, ROAS, or performance guarantee claim is needed
    - legal/privacy/ad-review decision or regulated category support is needed
    - publish, schedule activation, Player, or content delivery mutation is needed
    - external AI, camera, POS, inventory, weather, CRM, tracking tag, or ad network integration is needed
    - changed file outside allowed_paths
    - forbidden path touched
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Add GET /api/admin/reports/ad-inventory as an admin-only read-only endpoint.
    - Require tenant_id so the report cannot be requested as a broad cross-tenant inventory report.
    - Derive ad inventory from existing content_manifests.playlist_json ad/sponsor items without DB migration.
    - Default manifest status to active and support tenant/store/screen_group/release_channel/status/campaign/content/ad_slot/creative/qr/manifest filters server-side.
    - Report manifest-derived slot_position_count, sellable_slot_count, filled_slot_count, empty_slot_count, fill_rate, position_fill_rate, and unclassified ad/sponsor positions.
    - Overlay measured play and QR response evidence from existing reporting helpers without reporting revenue, ROI attribution, lift, ROAS, or guarantees.
    - Label inventory as manifest_derived and measured signals as measured.
    - Do not create content manifests, snapshots, publish, schedule, billing records, external reports, or external integrations.
    - Smoke coverage verifies inventory summary, per-slot metrics, filtered view, tenant isolation, missing tenant rejection, no forbidden claims, and no content_manifest creation side effect.

implementation_boundary:
  summary: Internal admin read-only API and reporting smoke extension only.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, external AI, ad network, POS, camera, or production mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:reporting
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  audit_checklist_ref: .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-197-AD-INVENTORY-READ-MODEL.yaml
  acceptance_tests:
    - smoke:reporting validates ad-inventory success for tenant/store/screen_group scope.
    - smoke:reporting validates missing tenant_id is rejected.
    - smoke:reporting validates ad_slot/creative/qr filters.
    - smoke:reporting validates manifest_derived and measured labels.
    - smoke:reporting validates no revenue, ROI, lift, ROAS, or guarantee claim.
    - smoke:reporting validates no content_manifest creation side effect.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
