schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-137-INTERNAL-ADMIN-IA-SHELL
parent_ssot: https://github.com/watchout/misell/issues/137
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@3b70d368bcbbcb1d200a941a8a0130aa54edf722
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/137
premise_confirmation_ref: https://github.com/watchout/misell/issues/137
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/137
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational gate evidence for this PR
    - structured audit exact-head admissibility
    - owner exact-head decision admissibility
    - diff scope and handoff consistency checks
  shirube_does_not_own:
    - branch protection or required-check configuration
    - security/CEO approval labels and protected authorization decisions
    - production deployment or runtime operations

cell:
  CELL-ID: CELL-MISELL-137-INTERNAL-ADMIN-IA-SHELL
  cell_type: ui_lite
  risk_class: R1
  goal: Organize the existing internal Cloud admin dashboard into clear workspaces and navigation without changing backend APIs, auth, DB schema, customer access, device behavior, publish, billing, or Studio execution contracts.
  non_scope:
    - backend route, API contract, DB migration, or schema change
    - new auth, RBAC, customer login, customer scope, staff scope, or partner scope behavior
    - customer-facing admin implementation beyond existing links and routes
    - content_manifest creation, publish, schedule activation, Player/device mutation, or device command behavior change
    - external AI/provider call, generated media, render/export, billing, credit, quota, ROI guarantee, or ad delivery behavior
  allowed_paths:
    - .shirube/cells/CELL-MISELL-137-INTERNAL-ADMIN-IA-SHELL.yaml
    - .shirube/control-handoffs/CH-MISELL-137-internal-admin-ia-shell.yaml
    - .shirube/audit-checklists/AUDIT-CHECKLIST-MISELL-137-INTERNAL-ADMIN-IA-SHELL.yaml
    - apps/cloud/README.md
    - apps/cloud/public/admin.html
    - apps/cloud/public/style.css
    - tests/e2e/misell-ui.spec.js
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - .github/workflows/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - apps/cloud/server.js
    - apps/cloud/migrations/**
    - apps/cloud/package.json
    - apps/player/**
    - package.json
    - package-lock.json
  protected_surfaces:
    - existing_authenticated_internal_admin_ui
    - no_auth_or_permission_model_change
    - no_backend_write_path_change
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - backend route, API mutation, DB migration, or schema change is needed
    - new auth/RBAC/customer/staff/partner behavior is needed
    - external AI/provider/render/publish/billing/device behavior is introduced
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Internal admin page exposes a persistent management menu with workspaces for overview, Studio, commerce, delivery, devices, and access.
    - Existing dashboard sections remain present and keep their existing DOM ids so current JavaScript behavior is preserved.
    - The first viewport no longer presents an undifferentiated list of forms; sections are grouped under clear workspace headings.
    - The IA shell is responsive and keeps navigation usable on desktop and mobile widths.
    - E2E verifies the admin menu, workspace grouping, and existing operational dashboard loading.

implementation_boundary:
  summary: Change only the internal admin static shell, styles, README note, and browser test coverage; do not add backend routes or persisted state.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, DB, queue, LaunchAgent, or external repository mutation

validation:
  pr_head_sha: supplied_by_github_pr_metadata_and_audit_request
  required_commands:
    - git diff --check
    - ruby YAML safe_load for cell/handoff/checklist
    - npm --prefix apps/cloud run check
    - npm run test:e2e
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - PR_head_SHA
    - changed_files
    - validation_commands
    - validation_results
    - structured_audit_comment
    - owner_decision
  acceptance_tests:
    - admin menu contains overview, Studio, commerce, delivery, devices, and access destinations
    - workspace headings render with existing operational sections beneath them
    - existing device dashboard and campaign project flows still load

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker
