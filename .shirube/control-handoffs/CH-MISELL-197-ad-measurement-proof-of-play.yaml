schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
control_handoff_id: CH-MISELL-197-AD-MEASUREMENT-PROOF-OF-PLAY
parent_ssot: https://github.com/watchout/misell/issues/197
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@6917720d0ea02fe96f3b7752aa802bc135ec1b19
framework_lock_ref: .shirube/shirube-framework-lock.yaml
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: https://github.com/watchout/misell/issues/197#issuecomment-4796867327
premise_confirmation_ref: https://github.com/watchout/misell/issues/197
spec_review_state: ready_for_implementation

repo: watchout/misell
repo_local_issue: https://github.com/watchout/misell/issues/197
owner:
  role: repo_owner
  actor: watchout
next_role: implementation

rps_scope:
  shirube_owns:
    - full operational PR evidence for this Cell
    - diff scope and handoff consistency checks
    - exact-head structured audit and owner-decision evidence requirements
  shirube_does_not_own:
    - existing Misell Gate 0 required checks
    - production deployment or runtime operations
    - billing, guarantee, legal approval, or advertiser contract decisions
    - security/CEO approval labels unless separately applied

cell:
  CELL-ID: CELL-MISELL-197-AD-MEASUREMENT-PROOF-OF-PLAY
  cell_type: runtime_foundation
  risk_class: R3
  goal: Add the measured Proof-of-Play foundation for ads by carrying ad measurement identifiers through playlist items, Player playback logs, Cloud playlogs, and reporting summary breakdowns.
  non_scope:
    - advertiser self-service
    - billing, pricing, guarantee, credits, or revenue settlement
    - incremental ROI, holdout tests, or performance guarantee claims
    - legal or regulated-industry review enforcement
    - external ad network integration
    - camera, POS, inventory, weather, or external analytics integration
    - separate ad schedule API
    - content_manifest creation or publish activation
    - customer project editing or advertiser dashboard UI
  allowed_paths:
    - .shirube/control-handoffs/CH-MISELL-197-ad-measurement-proof-of-play.yaml
    - apps/player/data/playlist.schema.json
    - apps/player/public/player.js
    - apps/player/server.js
    - apps/cloud/server.js
    - apps/cloud/scripts/smoke-reporting.mjs
  forbidden_paths:
    - .env
    - .env.*
    - secrets/**
    - deploy/**
    - .github/workflows/**
    - '**/branch-protection/**'
    - '**/ruleset/**'
    - package.json
    - package-lock.json
    - apps/cloud/public/**
    - apps/player/public/admin.js
  protected_surfaces:
    - db
    - migrations
    - runtime
    - api
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - non-additive DB migration required
    - auth/RBAC behavior change required
    - advertiser self-service or billing decision required
    - legal, guarantee, or regulated-industry policy decision required
    - external AI, camera, POS, inventory, weather, or ad network integration needed
    - missing exact head evidence
    - missing validation evidence
    - missing structured audit PASS/PASS_WITH_WARN for exact head
    - owner decision missing before merge
  acceptance_criteria:
    - Playlist schema accepts item_type plus ad_slot_id, creative_id, qr_link_id, content_id, and manifest_hash without requiring a separate ad schedule API.
    - Player normalizes playlist ad measurement fields and includes them in playback log payloads.
    - Cloud device playlog API stores item_type, ad_slot_id, creative_id, qr_link_id, manifest_hash, planned_duration_seconds, and played_duration_seconds in additive playlogs columns.
    - Cloud reporting summary exposes an ad_measurement breakdown grouped by campaign, content, item_type, ad_slot, creative, qr_link, and manifest hash.
    - QR scan counts can be joined to ad measurement groups by qr_link_id without claiming incremental ROI.
    - Report criteria can filter live summary by ad measurement fields, while persisted daily read model rejects ad-granular filters to avoid key mismatch.
    - Existing content summary, daily metrics, monthly snapshots, and legacy playlog payloads remain backward compatible.
    - Smoke coverage proves selected ad playback fields are persisted, reported, filterable, and do not create content_manifest or publish side effects.

implementation_boundary:
  summary: Extend existing playlist and playlog reporting paths for measured ad Proof-of-Play only.
  expected_pr_count: 1
  forbidden_operations:
    - merge
    - approve
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - production or deploy mutation
    - secret read or write
    - live AUN, Discord, external ad network, billing system, POS, camera, or production DB mutation

validation:
  required_commands:
    - git diff --check
    - ruby YAML safe_load for handoff
    - npm --prefix apps/player run check
    - npm --prefix apps/cloud run check
    - npm --prefix apps/cloud run smoke:reporting
    - npm run test:ci
    - npm run shirube:smoke-full-operational
  required_evidence:
    - changed_files
    - validation_commands
    - exact_head_sha
    - structured_audit
    - owner_decision
  acceptance_tests:
    - smoke:reporting includes ad item_type, ad_slot_id, creative_id, qr_link_id, and manifest_hash in playlog payloads.
    - smoke:reporting asserts report.ad_measurement contains the ad group with measured play counts and qr scan count.
    - smoke:reporting asserts live summary ad_slot filter works.
    - smoke:reporting asserts daily read model rejects ad-granular filters.

owner_decision:
  required_before_merge: true
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: null

post_merge:
  required_when_done_claimed: true
  required_evidence:
    - merge_commit
    - merged_at
    - post_merge_smoke_or_NA
    - next_step
    - no_unresolved_follow_up_blocker

legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: this_control_handoff
